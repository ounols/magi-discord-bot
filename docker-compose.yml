# MAGI 봇 — node:20-alpine 위에서 tsx 로 src 를 직접 실행한다.
#
# LLM 서버(`ai`)는 주인장의 환경에 맞게 호스트의 Tailscale MagicDNS 로 해석된다.
# 컨테이너가 호스트의 Tailscale 네트워크/DNS 를 그대로 쓸 수 있도록 network_mode: host 로 띄운다.
# (만약 Tailscale이 아닌 다른 네트워크 설정이라면, 적절히 수정해서 사용 필요)
#
# 사용:
#   1. .env 작성 (DISCORD_TOKEN, DISCORD_APP_ID, LLM_API_KEY 등)
#   2. 호스트에 Tailscale 이 실행 중이고 `ai` 가 MagicDNS 로 해석되는지 확인
#   3. docker compose up -d
#
# 첫 실행 시에만 npm install 이 실행돼 시간이 좀 걸리고, 이후엔 명명된 볼륨에 캐시되어 즉시 부팅된다.
#
# 주의: network_mode: host 는 Linux 호스트에서만 정상 동작한다. Docker Desktop (Mac/Windows) 에서는
# 동작이 제한적이므로 로컬 개발은 `npm run dev` 로 직접 실행하는 편이 낫다.

services:
  magi-bot:
    image: node:20-alpine
    container_name: magi-bot
    working_dir: /app
    restart: unless-stopped
    network_mode: host
    env_file:
      - .env
    volumes:
      # 소스 마운트 — 코드 수정 시 컨테이너 재시작만으로 반영 (또는 tsx watch 로 핫리로드)
      - .:/app
      # node_modules 는 명명된 볼륨에 둬서 호스트 OS 와 충돌하지 않게 함
      - magi-node-modules:/app/node_modules
    command: sh -c "npm install --no-audit --no-fund --silent && npx tsx src/index.ts"

volumes:
  magi-node-modules:
